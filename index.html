<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAP-INSTA | Multimedia Station</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0c10;
            color: #f3f4f6;
            overflow: hidden; 
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0c10;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #06b6d4;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animasi Logo Menyala-Redup */
        @keyframes logo-glow {
            0%, 100% {
                filter: drop-shadow(0 0 2px rgba(6, 182, 212, 0.3));
                opacity: 0.8;
            }
            50% {
                filter: drop-shadow(0 0 12px rgba(6, 182, 212, 0.8));
                opacity: 1;
            }
        }

        .animate-logo-glow {
            animation: logo-glow 3s ease-in-out infinite;
        }

        .sticky-header-bg {
            background-color: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
    </style>
</head>
<body>
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "", onClick }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElem = document.createElement('i');
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconElem.setAttribute('data-lucide', kebabName);
                    iconElem.style.width = `${size}px`;
                    iconElem.style.height = `${size}px`;
                    if (className) iconElem.className = className;
                    iconRef.current.appendChild(iconElem);
                    window.lucide.createIcons({
                        attrs: {
                            strokeWidth: 2,
                            width: size,
                            height: size
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} onClick={onClick} className={`inline-flex items-center justify-center ${onClick ? 'cursor-pointer' : ''}`} />;
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTANeMtbkopKarJIbqMfDdnjT9-85cmVJYz9pkcnKFx3iDT0iQPZxX5RuOsHWxcFMfag/exec";
        const LOGO_URL = "https://smartcap.or.id/assets/logo.png";

        const App = () => {
            const [archives, setArchives] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('mm_user')) || null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showShareModal, setShowShareModal] = useState(false);
            const [previewFile, setPreviewFile] = useState(null); 
            const [loginData, setLoginData] = useState({ name: '', class: '' });
            const [message, setMessage] = useState('');
            const [commentText, setCommentText] = useState('');
            const [activeFilter, setActiveFilter] = useState('Semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [shareData, setShareData] = useState({ driveLink: '', category: 'Gambar', caption: '' });

            useEffect(() => {
                if (user) setIsLoggedIn(true);
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    setLoading(true);
                    const res = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
                    const data = await res.json();
                    const mappedData = data.map(item => ({
                        ...item,
                        image: getDriveThumbnail(item.link),
                        embedUrl: getEmbedUrl(item.link),
                        isLiked: user ? item.likes?.some(l => l.userId === user.name) : false,
                        isBookmarked: user ? item.bookmarks?.some(b => b.userId === user.name) : false
                    }));
                    setArchives(mappedData.reverse());
                } catch (e) {
                    showToast("Gagal memuat data");
                } finally {
                    setLoading(false);
                }
            };

            const getFileId = (url) => {
                const match = url?.match(/\/file\/d\/(.+?)\/|\?id=(.+?)(&|$)|d\/(.+?)(\/|$)/);
                return match ? (match[1] || match[2] || match[4]) : null;
            };

            const getDriveThumbnail = (url) => {
                const id = getFileId(url);
                return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w800` : "https://via.placeholder.com/400?text=Error";
            };

            const getEmbedUrl = (url) => {
                const id = getFileId(url);
                return id ? `https://drive.google.com/file/d/${id}/preview` : null;
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const newUser = { ...loginData };
                setUser(newUser);
                setIsLoggedIn(true);
                localStorage.setItem('mm_user', JSON.stringify(newUser));
                setShowLoginModal(false);
                showToast(`Halo, ${newUser.name}!`);
                fetchData(); 
            };

            const handleShareSubmit = async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                
                const payload = {
                    id: "ID-" + Date.now(),
                    category: shareData.category,
                    author: user.name,
                    authorClass: user.class,
                    link: shareData.driveLink,
                    description: shareData.caption,
                    timestamp: new Date().toISOString()
                };

                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    showToast("Karya terkirim!");
                    setShowShareModal(false);
                    setShareData({ driveLink: '', category: 'Gambar', caption: '' });
                    setTimeout(fetchData, 1000);
                } catch (e) {
                    showToast("Gagal sinkron");
                } finally {
                    btn.disabled = false;
                }
            };

            const updateCloudSocial = async (id, field, value) => {
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'update_social', id, field, value })
                    });
                } catch (e) { console.error(e); }
            };

            const toggleLike = (id) => {
                if (!isLoggedIn) return setShowLoginModal(true);
                setArchives(prev => prev.map(item => {
                    if (item.id === id) {
                        const isLiked = item.likes?.some(l => l.userId === user.name);
                        const newLikes = isLiked 
                            ? item.likes.filter(l => l.userId !== user.name)
                            : [...(item.likes || []), { userId: user.name, time: new Date().toISOString() }];
                        updateCloudSocial(id, "Likes", newLikes);
                        const updatedItem = { ...item, likes: newLikes, isLiked: !isLiked };
                        if (previewFile?.id === id) setPreviewFile(updatedItem);
                        return updatedItem;
                    }
                    return item;
                }));
            };

            const toggleBookmark = (id) => {
                if (!isLoggedIn) return setShowLoginModal(true);
                setArchives(prev => prev.map(item => {
                    if (item.id === id) {
                        const isBookmarked = item.bookmarks?.some(b => b.userId === user.name);
                        const newBookmarks = isBookmarked 
                            ? item.bookmarks.filter(b => b.userId !== user.name)
                            : [...(item.bookmarks || []), { userId: user.name }];
                        updateCloudSocial(id, "Bookmarks", newBookmarks);
                        const updatedItem = { ...item, bookmarks: newBookmarks, isBookmarked: !isBookmarked };
                        if (previewFile?.id === id) setPreviewFile(updatedItem);
                        return updatedItem;
                    }
                    return item;
                }));
            };

            const addComment = (e) => {
                e.preventDefault();
                if (!isLoggedIn) return setShowLoginModal(true);
                if (!commentText.trim()) return;
                
                const newComment = {
                    id: Date.now(),
                    user: user.name,
                    text: commentText,
                    time: 'Baru saja'
                };

                setArchives(prev => prev.map(item => {
                    if (item.id === previewFile.id) {
                        const newComments = [...(item.comments || []), newComment];
                        updateCloudSocial(item.id, "Comments", newComments);
                        const updatedItem = { ...item, comments: newComments };
                        setPreviewFile(updatedItem);
                        return updatedItem;
                    }
                    return item;
                }));
                setCommentText('');
            };

            const showToast = (msg) => { setMessage(msg); setTimeout(() => setMessage(''), 3000); };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setUser(null);
                localStorage.removeItem('mm_user');
                showToast("Berhasil keluar.");
                fetchData();
            };

            const filteredArchives = archives.filter(item => {
                const matchesCat = activeFilter === 'Semua' || item.category === activeFilter;
                const matchesSearch = item.description?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      item.author?.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-[#0a0c10] text-[#f3f4f6]">
                    {message && (
                        <div className="fixed top-4 right-4 z-[100] bg-cyan-600 text-white px-6 py-3 rounded-lg shadow-2xl border border-cyan-400 animate-fade-in">
                            {message}
                        </div>
                    )}

                    {/* HEADER & FILTER */}
                    <div className="flex-none z-50 sticky-header-bg border-b border-gray-800 shadow-2xl shadow-black/50">
                        <div className="max-w-7xl mx-auto px-4 md:px-8 py-4 md:py-6">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-4">
                                    {/* Perubahan Ukuran Logo & Animasi Glow */}
                                    <div className="w-14 h-14 rounded-2xl overflow-hidden bg-gray-900 border border-gray-800 flex items-center justify-center p-2 shadow-xl relative group">
                                        <div className="absolute inset-0 bg-cyan-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                        <img src={LOGO_URL} className="w-full h-full object-contain animate-logo-glow" alt="Logo" />
                                    </div>
                                    <div className="hidden sm:block">
                                        <p className="text-[10px] uppercase tracking-[0.4em] text-cyan-500 font-black leading-none mb-1">Multimedia Station</p>
                                        <h1 className="text-2xl font-extrabold tracking-tighter uppercase leading-none">CAP <span className="font-light text-gray-400">INSTA</span></h1>
                                    </div>
                                </div>

                                <div className="flex gap-2 sm:gap-4">
                                    {isLoggedIn ? (
                                        <div className="flex items-center gap-3 bg-gray-800/30 pl-4 pr-1 py-1 rounded-full border border-gray-700">
                                            <span className="text-[10px] font-black uppercase text-cyan-400">{user.name.split(' ')[0]}</span>
                                            <button onClick={handleLogout} className="bg-gray-700 hover:bg-red-600 p-1.5 rounded-full transition-all text-white"><Icon name="X" size={12} /></button>
                                        </div>
                                    ) : (
                                        <button onClick={() => setShowLoginModal(true)} className="bg-white text-black px-4 py-1.5 rounded font-black text-[10px] hover:bg-gray-200 uppercase tracking-widest">Masuk</button>
                                    )}
                                    <button onClick={() => isLoggedIn ? setShowShareModal(true) : setShowLoginModal(true)} className="flex items-center gap-2 bg-cyan-600 text-white px-4 py-1.5 rounded font-black text-[10px] hover:bg-cyan-700 border border-cyan-500 uppercase tracking-widest">
                                        <Icon name="Plus" size={14} /> Bagikan
                                    </button>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row gap-4 items-stretch">
                                <div className="flex gap-2">
                                    {[
                                        { label: 'Karya', val: archives.length, icon: 'Database', color: 'text-cyan-400' },
                                        { label: 'Kategori', val: new Set(archives.map(a => a.category)).size, icon: 'Layers', color: 'text-purple-400' }
                                    ].map((stat, i) => (
                                        <div key={i} className="flex-1 bg-[#14181f]/80 border border-gray-800 rounded-xl px-4 py-2 flex items-center gap-3 min-w-[110px]">
                                            <Icon name={stat.icon} className={stat.color} size={14} />
                                            <div>
                                                <p className="text-sm font-black leading-none">{stat.val.toString().padStart(2, '0')}</p>
                                                <p className="text-[7px] uppercase text-gray-500 font-bold tracking-widest mt-0.5">{stat.label}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex-1 bg-black/40 border border-gray-800 rounded-xl flex items-center overflow-hidden focus-within:border-cyan-500/50 transition-colors">
                                    <div className="pl-4 pr-2 text-gray-600"><Icon name="Search" size={16} /></div>
                                    <input 
                                        type="text" 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        placeholder="Cari karya..." 
                                        className="bg-transparent border-none focus:ring-0 w-full text-xs py-3 text-gray-300 outline-none" 
                                    />
                                    <div className="h-4 w-[1px] bg-gray-800 mx-2"></div>
                                    <div className="relative pr-3">
                                        <select 
                                            value={activeFilter}
                                            onChange={(e) => setActiveFilter(e.target.value)}
                                            className="bg-transparent text-[8px] font-black uppercase tracking-widest text-cyan-500 border-none focus:ring-0 cursor-pointer pl-2 pr-6 outline-none appearance-none"
                                        >
                                            <option value="Semua" className="bg-[#0a0c10]">Semua</option>
                                            <option value="Gambar" className="bg-[#0a0c10]">Gambar</option>
                                            <option value="Video" className="bg-[#0a0c10]">Video</option>
                                        </select>
                                        <Icon name="ChevronDown" size={10} className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-cyan-500/50" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* AREA SCROLLABLE */}
                    <div className="flex-1 overflow-y-auto custom-scrollbar">
                        <main className="max-w-7xl mx-auto px-4 md:px-8 py-8">
                            {loading ? (
                                <div className="flex flex-col items-center justify-center py-20 text-gray-500 uppercase font-black tracking-widest text-[10px]">
                                    <Icon name="Loader2" size={30} className="animate-spin text-cyan-500 mb-4" />
                                    Sinkronisasi Arus Data...
                                </div>
                            ) : filteredArchives.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-20 border-2 border-dashed border-gray-800/30 rounded-[3rem] bg-[#14181f]/10">
                                    <Icon name="Inbox" size={30} className="text-gray-800 mb-4" />
                                    <h2 className="text-sm font-bold text-gray-600 uppercase italic">Data Tidak Ditemukan</h2>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 animate-fade-in">
                                    {filteredArchives.map((item) => (
                                        <div key={item.id} className="group bg-[#14181f] border border-gray-800 rounded-2xl overflow-hidden shadow-lg transition-all hover:-translate-y-1 hover:border-gray-700">
                                            <div className="p-3 flex items-center justify-between border-b border-gray-800/50">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-5 h-5 rounded-full bg-cyan-900/40 flex items-center justify-center text-[9px] font-bold text-cyan-500 border border-cyan-500/20">{item.author[0]}</div>
                                                    <span className="text-[9px] font-black uppercase text-gray-200 truncate max-w-[80px]">{item.author}</span>
                                                </div>
                                                <span className="text-[7px] font-black px-1.5 py-0.5 rounded bg-gray-900 text-gray-500 border border-gray-800 uppercase">{item.category}</span>
                                            </div>

                                            <div onClick={() => setPreviewFile(item)} className="relative aspect-square cursor-pointer overflow-hidden bg-black">
                                                <img src={item.image} alt={item.description} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-all duration-700" />
                                                <div className="absolute top-2 right-2 bg-black/60 backdrop-blur-md p-1.5 rounded-lg border border-white/10 text-white">
                                                    {item.category === "Video" ? <Icon name="Video" size={10} /> : <Icon name="Image" size={10} />}
                                                </div>
                                            </div>

                                            <div className="p-3 space-y-2">
                                                <div className="flex items-center gap-4">
                                                    <div className="flex items-center gap-1.5">
                                                        <Icon onClick={(e) => { e.stopPropagation(); toggleLike(item.id); }} name="Heart" size={18} className={`cursor-pointer transition-all active:scale-150 ${item.isLiked ? 'fill-red-500 text-red-500' : 'text-gray-400'}`} />
                                                        <span className="text-[9px] font-black text-gray-200">{item.likes?.length || 0}</span>
                                                    </div>
                                                    <div className="flex items-center gap-1.5">
                                                        <Icon onClick={() => setPreviewFile(item)} name="MessageCircle" size={18} className="text-gray-400 cursor-pointer hover:text-cyan-500" />
                                                        <span className="text-[9px] font-black text-gray-200">{item.comments?.length || 0}</span>
                                                    </div>
                                                    <div className="ml-auto">
                                                        <Icon onClick={(e) => { e.stopPropagation(); toggleBookmark(item.id); }} name="Bookmark" size={18} className={`cursor-pointer ${item.isBookmarked ? 'fill-white text-white' : 'text-gray-400'}`} />
                                                    </div>
                                                </div>
                                                <p className="text-[10px] text-gray-400 line-clamp-1 italic font-medium">"{item.description}"</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <footer className="mt-20 py-10 border-t border-gray-900 text-center text-[8px] text-gray-700 font-black uppercase tracking-[0.4em]">
                                Creative Archive Project • SmartCap Station 2024
                            </footer>
                        </main>
                    </div>

                    {/* MODALS */}
                    {previewFile && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/95 backdrop-blur-xl p-0 md:p-10 animate-fade-in">
                            <button onClick={() => setPreviewFile(null)} className="absolute top-4 right-4 z-[70] text-white/40 hover:text-white transition-colors">
                                <Icon name="X" size={30} />
                            </button>
                            <div className="bg-[#14181f] w-full max-w-6xl h-full md:h-[80vh] rounded-none md:rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row border border-gray-800">
                                <div className="flex-[1.5] bg-black relative flex items-center justify-center min-h-[300px] border-r border-gray-800">
                                    {previewFile.embedUrl ? (
                                        <iframe src={previewFile.embedUrl} className="w-full h-full border-none" allow="autoplay" title="Preview"></iframe>
                                    ) : ( <div className="text-[10px] font-black text-gray-700 uppercase">File Error</div> )}
                                </div>
                                <div className="flex-1 flex flex-col bg-[#0f1117] h-full overflow-hidden">
                                    <div className="p-4 border-b border-gray-800 flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-cyan-600 flex items-center justify-center font-black text-xs text-white">{previewFile.author[0]}</div>
                                        <div>
                                            <h5 className="text-[10px] font-black text-white leading-none uppercase">{previewFile.author}</h5>
                                            <p className="text-[8px] text-cyan-500 font-bold uppercase mt-1 tracking-widest">{previewFile.authorClass}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                        <div className="text-[11px] italic text-gray-400 border-l-2 border-cyan-500 pl-3 py-1 mb-6 bg-cyan-500/5">"{previewFile.description}"</div>
                                        {previewFile.comments?.map(comment => (
                                            <div key={comment.id} className="flex gap-3 animate-fade-in">
                                                <div className="w-6 h-6 rounded-md bg-gray-800 flex-shrink-0 flex items-center justify-center text-[9px] font-black text-gray-500">{comment.user?.[0]}</div>
                                                <div className="text-[10px] leading-relaxed">
                                                    <span className="font-black mr-2 text-cyan-400 uppercase">{comment.user}</span>
                                                    <span className="text-gray-300">{comment.text}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* ICON BAR */}
                                    <div className="px-4 py-3 border-t border-gray-800/50 flex items-center gap-4 bg-black/10">
                                        <div className="flex items-center gap-4">
                                            <div className="flex items-center gap-1.5">
                                                <Icon onClick={() => toggleLike(previewFile.id)} name="Heart" size={22} className={`cursor-pointer transition-all active:scale-150 ${previewFile.isLiked ? 'fill-red-500 text-red-500' : 'text-gray-400'}`} />
                                                <span className="text-[10px] font-black text-gray-400">{previewFile.likes?.length || 0}</span>
                                            </div>
                                            <div className="flex items-center gap-1.5">
                                                <Icon name="MessageCircle" size={22} className="text-gray-400" />
                                                <span className="text-[10px] font-black text-gray-400">{previewFile.comments?.length || 0}</span>
                                            </div>
                                        </div>
                                        <Icon onClick={() => toggleBookmark(previewFile.id)} name="Bookmark" size={22} className={`ml-auto cursor-pointer ${previewFile.isBookmarked ? 'fill-white text-white' : 'text-gray-400'}`} />
                                    </div>

                                    <form onSubmit={addComment} className="p-4 border-t border-gray-800 flex items-center gap-3 bg-black/20">
                                        <input type="text" value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder="Tulis komentar..." className="bg-transparent border-none focus:ring-0 text-[10px] text-white flex-1 outline-none font-medium" />
                                        <button type="submit" disabled={!commentText.trim()} className={`text-[10px] font-black uppercase tracking-widest ${commentText.trim() ? 'text-cyan-500' : 'text-gray-700'}`}>Kirim</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {showLoginModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
                            <div className="bg-[#14181f] border border-gray-800 w-full max-sm rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-purple-500"></div>
                                <h2 className="text-lg font-black text-center mb-8 uppercase tracking-[0.2em] italic text-white">Identitas <span className="text-cyan-500">Siswa</span></h2>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[8px] font-black text-gray-500 uppercase ml-2">Nama Lengkap</label>
                                        <input required type="text" value={loginData.name} onChange={(e) => setLoginData({...loginData, name: e.target.value})} className="w-full bg-black/50 border border-gray-800 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 text-xs text-white font-bold" />
                                    </div>
                                    <div className="space-y-1 pb-4">
                                        <label className="text-[8px] font-black text-gray-500 uppercase ml-2">Kelas (Contoh: XII MM 1)</label>
                                        <input required type="text" value={loginData.class} onChange={(e) => setLoginData({...loginData, class: e.target.value})} className="w-full bg-black/50 border border-gray-800 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 text-xs text-white font-bold" />
                                    </div>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setShowLoginModal(false)} className="flex-1 bg-gray-800/50 py-3.5 rounded-xl font-black uppercase text-[10px] tracking-widest text-gray-400">Batal</button>
                                        <button type="submit" className="flex-[2] bg-cyan-600 py-3.5 rounded-xl font-black uppercase text-[10px] tracking-widest text-white shadow-lg shadow-cyan-500/20">Masuk</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showShareModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
                            <div className="bg-[#14181f] border border-gray-800 w-full max-w-md rounded-3xl overflow-hidden shadow-2xl relative text-white">
                                <div className="bg-cyan-600 px-6 py-4 flex justify-between items-center">
                                    <h3 className="font-black text-[10px] uppercase tracking-[0.2em] italic">Bagikan Karya</h3>
                                    <button onClick={() => setShowShareModal(false)}><Icon name="X" size={18} /></button>
                                </div>
                                <form onSubmit={handleShareSubmit} className="p-6 space-y-4">
                                    <div className="flex gap-2">
                                        {["Gambar", "Video"].map(cat => (
                                            <button key={cat} type="button" onClick={() => setShareData({...shareData, category: cat})} className={`flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest border transition-all ${shareData.category === cat ? 'bg-cyan-600 border-cyan-400 text-white shadow-lg shadow-cyan-500/20' : 'bg-black/40 border-gray-800 text-gray-500'}`}>{cat}</button>
                                        ))}
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[8px] font-black text-gray-600 uppercase ml-1">Link Drive (Akses Lihat Semua)</label>
                                        <input required type="url" value={shareData.driveLink} onChange={(e) => setShareData({...shareData, driveLink: e.target.value})} className="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 text-[11px] text-white" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[8px] font-black text-gray-600 uppercase ml-1">Deskripsi Karya</label>
                                        <textarea required rows="2" value={shareData.caption} onChange={(e) => setShareData({...shareData, caption: e.target.value})} className="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 text-[11px] resize-none text-white" />
                                    </div>
                                    <button type="submit" className="w-full bg-white text-black font-black py-3.5 rounded-xl uppercase text-[10px] tracking-[0.2em] hover:bg-cyan-400 transition-all mt-2 shadow-xl">Kirim ke Station</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
